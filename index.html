<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudTrans — 实时字幕</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/markers.css" />
</head>
<body>
  <!-- 顶部条 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark">A</span>
      <span class="brand__name">AudTrans</span>
    </div>
    <div class="topbar__spacer"></div>
    <div id="compatHint" class="compat-hint compat-hint--.hidden" role="alert"></div>
    <label class="lang-select">
      主题
      <select id="themeSelect">
        <option value="dark" selected>暗色</option>
        <option value="light">亮色</option>
        <option value="notion">Notion</option>
      </select>
    </label>
    <label class="lang-select">
      语言
      <select id="langSelect">
        <option value="zh-CN" selected>中文（简体）</option>
        <option value="en-US">English</option>
      </select>
    </label>
  </header>

  <!-- 主体两栏 -->
  <main class="layout">
    <!-- 左：历史会话 -->
    <aside class="sidebar">
      <h2 class="sidebar__title">历史会话</h2>
      <ul id="historyList" class="history-list">
        <li class="history-empty">暂无历史，开始录音后自动生成。</li>
      </ul>
    </aside>

    <!-- 右：字幕工作区 -->
    <section class="stage">
      <!-- 音频可视化 -->
      <canvas id="visualizer" class="visualizer" width="900" height="60"></canvas>

      <!-- 实时字幕 -->
      <div id="caption" class="caption" aria-live="polite">
        <p class="caption__hint">点击下方「开始录音」，然后说话。</p>
      </div>

      <!-- 导出区（录音结束后出现） -->
      <div id="exportBar" class="export-bar export-bar--hidden">
        <button id="copyCleanBtn" class="btn btn--ghost">复制清理文本</button>
        <button id="downloadTxtBtn" class="btn btn--ghost">下载 TXT</button>
        <button id="downloadJsonBtn" class="btn btn--ghost">导出 JSON</button>
      </div>
    </section>
  </main>

  <!-- 底部控制栏 -->
  <footer class="controlbar">
    <button id="startBtn" class="btn btn--primary">开始录音</button>
    <button id="stopBtn" class="btn btn--danger" disabled>结束录音</button>
    <span id="recTimer" class="rec-timer" aria-live="off">00:00</span>
    <span class="controlbar__spacer"></span>
    <label class="fontsize-control">
      字号
      <input id="fontSizeRange" type="range" min="18" max="64" value="32" />
    </label>
  </footer>

  <!-- 二次确认弹层 -->
  <div id="confirmModal" class="modal modal--hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal__card">
      <h3 id="confirmTitle" class="modal__title"></h3>
      <p id="confirmText" class="modal__text"></p>
      <div class="modal__actions">
        <button id="confirmCancel" class="btn btn--ghost">取消</button>
        <button id="confirmOk" class="btn btn--danger">确认</button>
      </div>
    </div>
  </div>

  <!-- 模块入口（ES Module） -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
